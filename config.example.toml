# Copy this file to `config.toml` and fill in your details.
# `config.toml` is gitignored so your API key never lands in the repo.
#
# You can also override any of these with environment variables:
#   STASH_URL, STASH_API_KEY

[stash]
# Base URL of your Stash server (no trailing /graphql — the client adds it).
url = "http://192.168.1.2:6969"

# API key from Stash → Settings → Security → Authentication.
# Leave empty ("") if your Stash has no authentication configured.
api_key = ""

# Seconds before a GraphQL request times out.
timeout = 30


[sampling]
# How often to sample, in seconds. In sparse mode every sample is one cheap
# seek+decode, so this directly sets the cost: 8 is a good default for long
# scenes. Smaller = finer time resolution, more samples.
# (Env override: PEAKS_INTERVAL_SECONDS)
interval_seconds = 8.0

# "sparse"    — DEFAULT, the fast path for long videos: seek to each sample
#   time and decode exactly one keyframe. Cost scales with the number of
#   samples, not the video's length. Samples snap to keyframes.
# "interval"  — decode the ENTIRE file, keep one frame per interval. Precise
#   grid, but brutal on hour-long files. For short clips.
# "keyframes" — legacy full-file keyframe pass.
# Changing mode or interval invalidates cache entries (they re-embed).
# (Env override: PEAKS_SAMPLING_MODE)
mode = "sparse"

# GPU-assisted video decode: "" (CPU), "cuda" (NVDEC), or "auto".
# Decode — not embedding — is the pipeline bottleneck; if the GPU is in the
# box anyway, "cuda" is usually a large speedup on H.264/HEVC sources.
# (Env override: PEAKS_HWACCEL)
hwaccel = ""

# Frame delivery: "raw" (default) pipes raw frames from ffmpeg straight to the
# GPU at the model's input size — no JPEG encode, no PIL decode, no CPU resize.
# "jpeg" is the legacy path, kept as an escape hatch if raw misbehaves on some
# files. (Env override: PEAKS_PIPELINE)
pipeline = "raw"


[library]
# Only work on scenes whose file path starts with this (blank = whole library).
# Point it at a folder to exclude everything else — e.g. skip VR by scoping to
# your non-VR folder. Must be the path as STASH sees it (the container path),
# and it includes all subfolders. (Env override: PEAKS_LIBRARY_PATH)
path = ""


[schedule]
# If > 0, the web app (`peaks web`) auto-embeds newly-added scenes every N
# hours — handy for picking up new scenes on CPU after the GPU goes back to
# the VM. 0 = manual only. (Env override: PEAKS_EMBED_EVERY_HOURS)
embed_hours = 0.0


[markers]
# The tag name written onto scene markers this tool generates.
# An "apex" is one good timestamp-segment. This is only the DEFAULT profile —
# run any command with --tag to work on another (e.g. "apex-heels"), which
# reads its reference stills from references/<tag>/ automatically. Hyphenated
# names are recommended (they map 1:1 to folder names over SMB).
tag_name = "apex"


[embedding]
# Which frame embedder to use:
#   "dino" — DINOv2, visual structure (positions, angles, body type)
#   "clip" — OpenCLIP, nameable attributes (outfits, heels) + enables text
#            search in the web Explorer (run a second pass with model="clip")
#   "fake" — deterministic stub for testing without torch
# (Env override: PEAKS_MODEL)
model = "dino"
# Where cached frame vectors live (gitignored). Embed once; reuse forever.
cache_dir = "cache/embeddings"
# "" = auto (CUDA if available, else CPU). Or force "cuda" / "cpu".
device = ""
batch_size = 64
# Scenes decoded concurrently during embed (raw path). Sparse sampling waits
# on disk seeks, so 3-4 workers is a near-linear speedup; drop to 1 if the
# array thrashes. (Env override: PEAKS_WORKERS)
workers = 3


[scoring]
# Tier-1 similarity scoring + segment extraction. Tune `high`/`low` after you
# see a dry run (`peaks score` without --write).
reduce = "max"          # "max" (specific) | "mean" (broader)
# "none": thresholds are absolute (raw cosine / probability).
# "scene-z": scores are z-scored within each scene, so thresholds mean
#   "N std-devs above that scene's baseline" (e.g. high = 2.0, low = 1.0).
#   Useful because raw DINOv2/CLIP similarity baselines vary per library.
normalize = "none"
smooth_window = 3       # moving-average window over per-frame scores
high = 0.45             # enter a segment at/above this score
low = 0.35              # stay in it until the score drops below this
min_duration = 3.0      # discard segments shorter than this (seconds)
merge_gap = 2.0         # merge neighbouring segments closer than this (seconds)
max_duration = 30.0     # split anything longer than this (0 = no cap)
pad = 0.5               # pad each segment edge by this many seconds
# Directory of example stills you love (the Tier-1 references). Gitignored.
references_dir = "references"


[modeling]
# Tier-2 trained classifiers. `peaks label` collects yes/no frame labels,
# `peaks train` fits a model per taste profile, and `peaks score` uses it
# automatically when a models/<tag>.pkl exists (else falls back to Tier-1).
dir = "models"            # where trained models are saved (gitignored)
classifier = "logreg"     # "logreg" (fast, robust) | "mlp"
labels_path = "labels.json"  # your frame labels (gitignored)
